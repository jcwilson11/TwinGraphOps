global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: twingraphops-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: twingraphops-frontend
    metrics_path: /metrics
    static_configs:
      - targets:
          - frontend:3000

groups:
  - name: twingraphops-platform
    rules:
      - alert: TwinGraphOpsApiDown
        expr: up{job="twingraphops-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: TwinGraphOps API is down
          description: Prometheus has been unable to scrape the API for at least 1 minute.

      - alert: TwinGraphOpsFrontendDown
        expr: up{job="twingraphops-frontend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: TwinGraphOps frontend is down
          description: Prometheus has been unable to scrape the frontend for at least 1 minute.

      - alert: TwinGraphOpsNeo4jUnavailable
        expr: max_over_time(twingraphops_dependency_neo4j_up[2m]) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Neo4j dependency is unavailable
          description: The API has reported Neo4j unavailable for the last 2 minutes.

      - alert: TwinGraphOpsHighApiErrorRate
        expr: |
          (
            sum(rate(twingraphops_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(twingraphops_http_requests_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Elevated API 5xx rate
          description: More than 5% of API requests have been failing with 5xx responses over the last 5 minutes.

      - alert: TwinGraphOpsHighIngestFailureRate
        expr: sum(rate(twingraphops_ingest_failures_total[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Legacy component ingestion failures detected
          description: The legacy component ingestion pipeline has reported failures during the last 10 minutes.

      - alert: TwinGraphOpsDocumentIngestFailures
        expr: sum(rate(twingraphops_document_ingest_failures_total[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Document knowledge graph ingestion failures detected
          description: The async document knowledge graph pipeline has reported failures during the last 10 minutes.

      - alert: TwinGraphOpsDocumentPageMarkerFailures
        expr: sum(rate(twingraphops_document_page_marker_failures_total[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: PDF page marker validation failures detected
          description: PDF conversion or page-aware chunk validation is failing for document knowledge graph ingestion.

      - alert: TwinGraphOpsGeminiTimeouts
        expr: sum(rate(twingraphops_gemini_timeouts_total[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Gemini extraction timeouts detected
          description: Gemini extraction requests are timing out during graph creation.

      - alert: TwinGraphOpsHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(twingraphops_http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency is elevated
          description: API p95 latency has remained above 1 second for 10 minutes.

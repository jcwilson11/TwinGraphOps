services:
  neo4j:
    image: neo4j:5
    container_name: twin_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH_FILE: /run/secrets/neo4j_auth
      TWIN_ENV: ${TWIN_ENV:-local}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    secrets:
      - neo4j_auth
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/7687'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: ./api
    image: ${API_IMAGE:-twin_api:latest}
    container_name: twin_api
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER_FILE: /run/secrets/neo4j_user
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      GEMINI_MAX_CHARS: ${GEMINI_MAX_CHARS:-2400}
      GEMINI_CHUNK_OVERLAP: ${GEMINI_CHUNK_OVERLAP:-200}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-2}
      GEMINI_RETRY_BACKOFF_SECONDS: ${GEMINI_RETRY_BACKOFF_SECONDS:-1.0}
      ARTIFACTS_DIR: /app/runtime/artifacts
      TWIN_ENV: ${TWIN_ENV:-local}
    volumes:
      - api_artifacts:/app/runtime/artifacts
    secrets:
      - neo4j_user
      - neo4j_password
      - gemini_api_key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build: ./frontend
    image: ${FRONTEND_IMAGE:-twin_frontend:latest}
    container_name: twin_frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://api:8000}
      TWIN_ENV: ${TWIN_ENV:-local}
    command: node server.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: twin_prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.4
    container_name: twin_grafana
    ports:
      - "3001:3000"
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    entrypoint:
      - /bin/sh
      - -ec
    command: |
      export GF_SECURITY_ADMIN_USER="$(cat /run/secrets/grafana_admin_user)"
      export GF_SECURITY_ADMIN_PASSWORD="$(cat /run/secrets/grafana_admin_password)"
      exec /run.sh
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    depends_on:
      prometheus:
        condition: service_started

volumes:
  neo4j_data:
  neo4j_logs:
  api_artifacts:
  prometheus_data:
  grafana_data:

secrets:
  neo4j_auth:
    file: ./infra/secrets/neo4j_auth.txt
  neo4j_user:
    file: ./infra/secrets/neo4j_user.txt
  neo4j_password:
    file: ./infra/secrets/neo4j_password.txt
  gemini_api_key:
    file: ./infra/secrets/gemini_api_key.txt
  grafana_admin_user:
    file: ./infra/secrets/grafana_admin_user.txt
  grafana_admin_password:
    file: ./infra/secrets/grafana_admin_password.txt

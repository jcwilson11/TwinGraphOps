version: '3.9'

services:
  neo4j:
    image: neo4j:5
    container_name: twin_neo4j
    ports:
      - "7474:7474"
    environment:
      - NEO4J_AUTH_FILE=/run/secrets/neo4j_auth
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    secrets:
      - neo4j_auth

  api:
    build: ./api
    image: twin_api:latest
    container_name: twin_api
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER_FILE=/run/secrets/neo4j_user
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
    secrets:
      - neo4j_user
      - neo4j_password

  frontend:
    build: ./frontend
    image: twin_frontend:latest
    container_name: twin_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: node server.js

volumes:
  neo4j_data:
  neo4j_logs:

secrets:
  neo4j_auth:
    file: ./infra/secrets/neo4j_auth.txt
  neo4j_user:
    file: ./infra/secrets/neo4j_user.txt
  neo4j_password:
    file: ./infra/secrets/neo4j_password.txt
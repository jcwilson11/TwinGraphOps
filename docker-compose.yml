services:
  neo4j:
    image: neo4j:5
    container_name: twin_neo4j
    ports:
      - "7474:7474"
    environment:
      NEO4J_AUTH_FILE: /run/secrets/neo4j_auth
      TWIN_ENV: ${TWIN_ENV:-local}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    secrets:
      - neo4j_auth
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/7474'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: ./api
    image: twin_api:latest
    container_name: twin_api
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7474
      NEO4J_USER_FILE: /run/secrets/neo4j_user
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      TWIN_ENV: ${TWIN_ENV:-local}
    secrets:
      - neo4j_user
      - neo4j_password
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build: ./frontend
    image: twin_frontend:latest
    container_name: twin_frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      TWIN_ENV: ${TWIN_ENV:-local}
    command: node server.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  neo4j_data:
  neo4j_logs:

secrets:
  neo4j_auth:
    file: ./infra/secrets/neo4j_auth.txt
  neo4j_user:
    file: ./infra/secrets/neo4j_user.txt
  neo4j_password:
    file: ./infra/secrets/neo4j_password.txt

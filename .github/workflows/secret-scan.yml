name: Secret Scan Gate

on:
  push:
    branches:
      - main
      - dev
      - twin-*
  pull_request:
    branches:
      - main
      - dev

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (fail on findings)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.18.2 \
            detect --source=/repo --verbose --redact --exit-code=1
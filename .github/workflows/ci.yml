name: TwinGraphOps CI

on:
  push:
    branches: ["main", "dev", "twin-*"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run API unit tests
        env:
          TWIN_ENV: ci
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt
          python -m unittest discover -s api/tests -v

      - name: Build Docker images
        run: docker compose build

      - name: Create CI secret files for smoke test
        run: |
          mkdir -p infra/secrets
          printf '%s' 'neo4j/ci-password' > infra/secrets/neo4j_auth.txt
          printf '%s' 'neo4j' > infra/secrets/neo4j_user.txt
          printf '%s' 'ci-password' > infra/secrets/neo4j_password.txt
          printf '%s' 'ci-gemini-placeholder' > infra/secrets/gemini_api_key.txt

      - name: Compose up (smoke test)
        env:
          TWIN_ENV: ci
        run: docker compose up -d --build

      - name: Verify API and frontend smoke checks
        run: |
          check_url() {
            local url="$1"
            if ! curl -fsS "$url" > /dev/null; then
              echo "Check failed: $url"
              return 1
            fi
          }

          for i in {1..45}; do
            echo "Smoke attempt $i/45"
            if check_url http://localhost:8000/health \
              && check_url http://localhost:8000/ready \
              && check_url http://localhost:8000/metrics \
              && check_url http://localhost:3000/healthz; then
              echo "Smoke checks passed"
              exit 0
            fi
            if [ "$i" -eq 15 ] || [ "$i" -eq 30 ]; then
              docker compose ps
            fi
            sleep 2
          done
          echo "Smoke checks failed"
          docker compose ps
          docker compose logs --tail=100
          exit 1

      - name: Show running services
        run: docker compose ps

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Cleanup compose stack and CI secret files
        if: always()
        run: |
          docker compose down -v
          rm -f infra/secrets/neo4j_auth.txt infra/secrets/neo4j_user.txt infra/secrets/neo4j_password.txt infra/secrets/gemini_api_key.txt

  validate-staging-config:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'dev' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    needs: build-test-and-smoke
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare staging secret files
        env:
          STAGING_NEO4J_AUTH: ${{ secrets.STAGING_NEO4J_AUTH }}
          STAGING_NEO4J_USER: ${{ secrets.STAGING_NEO4J_USER }}
          STAGING_NEO4J_PASSWORD: ${{ secrets.STAGING_NEO4J_PASSWORD }}
          STAGING_GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
        run: |
          if [ -z "$STAGING_NEO4J_AUTH" ] || [ -z "$STAGING_NEO4J_USER" ] || [ -z "$STAGING_NEO4J_PASSWORD" ] || [ -z "$STAGING_GEMINI_API_KEY" ]; then
            echo "Staging environment secrets were not fully available. Falling back to demo values for config validation." >&2
          fi
          STAGING_NEO4J_AUTH="${STAGING_NEO4J_AUTH:-neo4j/staging-demo-password}"
          STAGING_NEO4J_USER="${STAGING_NEO4J_USER:-neo4j}"
          STAGING_NEO4J_PASSWORD="${STAGING_NEO4J_PASSWORD:-staging-demo-password}"
          STAGING_GEMINI_API_KEY="${STAGING_GEMINI_API_KEY:-staging-gemini-placeholder}"
          mkdir -p infra/secrets
          printf '%s' "$STAGING_NEO4J_AUTH" > infra/secrets/neo4j_auth.txt
          printf '%s' "$STAGING_NEO4J_USER" > infra/secrets/neo4j_user.txt
          printf '%s' "$STAGING_NEO4J_PASSWORD" > infra/secrets/neo4j_password.txt
          printf '%s' "$STAGING_GEMINI_API_KEY" > infra/secrets/gemini_api_key.txt

      - name: Validate compose config (staging)
        env:
          TWIN_ENV: staging
        run: docker compose config > /tmp/docker-compose.staging.rendered.yml

      - name: Upload staging config artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-staging
          path: /tmp/docker-compose.staging.rendered.yml

      - name: Cleanup staging secret files
        if: always()
        run: rm -f infra/secrets/neo4j_auth.txt infra/secrets/neo4j_user.txt infra/secrets/neo4j_password.txt infra/secrets/gemini_api_key.txt

  validate-production-config:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    needs: build-test-and-smoke
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare production secret files
        env:
          PROD_NEO4J_AUTH: ${{ secrets.PROD_NEO4J_AUTH }}
          PROD_NEO4J_USER: ${{ secrets.PROD_NEO4J_USER }}
          PROD_NEO4J_PASSWORD: ${{ secrets.PROD_NEO4J_PASSWORD }}
          PROD_GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}
        run: |
          missing=()
          [ -n "$PROD_NEO4J_AUTH" ] || missing+=("PROD_NEO4J_AUTH")
          [ -n "$PROD_NEO4J_USER" ] || missing+=("PROD_NEO4J_USER")
          [ -n "$PROD_NEO4J_PASSWORD" ] || missing+=("PROD_NEO4J_PASSWORD")
          [ -n "$PROD_GEMINI_API_KEY" ] || missing+=("PROD_GEMINI_API_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required production environment secrets: ${missing[*]}" >&2
            echo "These values come from GitHub Actions secrets for the 'production' environment, not from local infra/secrets files." >&2
            echo "If this run is for a forked PR or bot PR, GitHub may intentionally withhold secrets." >&2
            exit 1
          fi
          mkdir -p infra/secrets
          printf '%s' "$PROD_NEO4J_AUTH" > infra/secrets/neo4j_auth.txt
          printf '%s' "$PROD_NEO4J_USER" > infra/secrets/neo4j_user.txt
          printf '%s' "$PROD_NEO4J_PASSWORD" > infra/secrets/neo4j_password.txt
          printf '%s' "$PROD_GEMINI_API_KEY" > infra/secrets/gemini_api_key.txt

      - name: Validate compose config (production)
        env:
          TWIN_ENV: production
        run: docker compose config > /tmp/docker-compose.production.rendered.yml

      - name: Upload production config artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-production
          path: /tmp/docker-compose.production.rendered.yml

      - name: Cleanup production secret files
        if: always()
        run: rm -f infra/secrets/neo4j_auth.txt infra/secrets/neo4j_user.txt infra/secrets/neo4j_password.txt infra/secrets/gemini_api_key.txt

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [build-test-and-smoke, validate-staging-config]
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare staging secret files
        env:
          STAGING_NEO4J_AUTH: ${{ secrets.STAGING_NEO4J_AUTH }}
          STAGING_NEO4J_USER: ${{ secrets.STAGING_NEO4J_USER }}
          STAGING_NEO4J_PASSWORD: ${{ secrets.STAGING_NEO4J_PASSWORD }}
          STAGING_GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
        run: |
          if [ -z "$STAGING_NEO4J_AUTH" ] || [ -z "$STAGING_NEO4J_USER" ] || [ -z "$STAGING_NEO4J_PASSWORD" ] || [ -z "$STAGING_GEMINI_API_KEY" ]; then
            echo "Staging environment secrets were not fully available. Falling back to demo values for the deployment simulation." >&2
          fi
          STAGING_NEO4J_AUTH="${STAGING_NEO4J_AUTH:-neo4j/staging-demo-password}"
          STAGING_NEO4J_USER="${STAGING_NEO4J_USER:-neo4j}"
          STAGING_NEO4J_PASSWORD="${STAGING_NEO4J_PASSWORD:-staging-demo-password}"
          STAGING_GEMINI_API_KEY="${STAGING_GEMINI_API_KEY:-staging-gemini-placeholder}"
          mkdir -p infra/secrets
          printf '%s' "$STAGING_NEO4J_AUTH" > infra/secrets/neo4j_auth.txt
          printf '%s' "$STAGING_NEO4J_USER" > infra/secrets/neo4j_user.txt
          printf '%s' "$STAGING_NEO4J_PASSWORD" > infra/secrets/neo4j_password.txt
          printf '%s' "$STAGING_GEMINI_API_KEY" > infra/secrets/gemini_api_key.txt

      - name: Simulate staging deployment
        env:
          TWIN_ENV: staging
        run: docker compose up -d --build

      - name: Verify staging deployment
        run: |
          check_url() {
            local url="$1"
            if ! curl -fsS "$url" > /dev/null; then
              echo "Check failed: $url"
              return 1
            fi
          }

          for i in {1..45}; do
            echo "Staging attempt $i/45"
            if check_url http://localhost:8000/health \
              && check_url http://localhost:8000/ready \
              && check_url http://localhost:8000/metrics \
              && check_url http://localhost:3000/healthz; then
              echo "Staging promotion checks passed"
              exit 0
            fi
            if [ "$i" -eq 15 ] || [ "$i" -eq 30 ]; then
              docker compose ps
            fi
            sleep 2
          done
          echo "Staging promotion checks failed"
          docker compose ps
          docker compose logs --tail=100
          exit 1

      - name: Record staging deployment evidence
        run: |
          docker compose ps
          curl -fsS http://localhost:8000/metrics

      - name: Show staging logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Cleanup staging deployment simulation
        if: always()
        run: |
          docker compose down -v
          rm -f infra/secrets/neo4j_auth.txt infra/secrets/neo4j_user.txt infra/secrets/neo4j_password.txt infra/secrets/gemini_api_key.txt

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test-and-smoke, validate-production-config]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare production secret files
        env:
          PROD_NEO4J_AUTH: ${{ secrets.PROD_NEO4J_AUTH }}
          PROD_NEO4J_USER: ${{ secrets.PROD_NEO4J_USER }}
          PROD_NEO4J_PASSWORD: ${{ secrets.PROD_NEO4J_PASSWORD }}
          PROD_GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}
        run: |
          missing=()
          [ -n "$PROD_NEO4J_AUTH" ] || missing+=("PROD_NEO4J_AUTH")
          [ -n "$PROD_NEO4J_USER" ] || missing+=("PROD_NEO4J_USER")
          [ -n "$PROD_NEO4J_PASSWORD" ] || missing+=("PROD_NEO4J_PASSWORD")
          [ -n "$PROD_GEMINI_API_KEY" ] || missing+=("PROD_GEMINI_API_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required production environment secrets: ${missing[*]}" >&2
            echo "These values come from GitHub Actions secrets for the 'production' environment, not from local infra/secrets files." >&2
            echo "If this run is for a forked PR or bot PR, GitHub may intentionally withhold secrets." >&2
            exit 1
          fi
          mkdir -p infra/secrets
          printf '%s' "$PROD_NEO4J_AUTH" > infra/secrets/neo4j_auth.txt
          printf '%s' "$PROD_NEO4J_USER" > infra/secrets/neo4j_user.txt
          printf '%s' "$PROD_NEO4J_PASSWORD" > infra/secrets/neo4j_password.txt
          printf '%s' "$PROD_GEMINI_API_KEY" > infra/secrets/gemini_api_key.txt

      - name: Simulate production deployment
        env:
          TWIN_ENV: production
        run: docker compose up -d --build

      - name: Verify production deployment
        run: |
          check_url() {
            local url="$1"
            if ! curl -fsS "$url" > /dev/null; then
              echo "Check failed: $url"
              return 1
            fi
          }

          for i in {1..45}; do
            echo "Production attempt $i/45"
            if check_url http://localhost:8000/health \
              && check_url http://localhost:8000/ready \
              && check_url http://localhost:8000/metrics \
              && check_url http://localhost:3000/healthz; then
              echo "Production promotion checks passed"
              exit 0
            fi
            if [ "$i" -eq 15 ] || [ "$i" -eq 30 ]; then
              docker compose ps
            fi
            sleep 2
          done
          echo "Production promotion checks failed"
          docker compose ps
          docker compose logs --tail=100
          exit 1

      - name: Record production deployment evidence
        run: |
          docker compose ps
          curl -fsS http://localhost:8000/metrics

      - name: Show production logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Cleanup production deployment simulation
        if: always()
        run: |
          docker compose down -v
          rm -f infra/secrets/neo4j_auth.txt infra/secrets/neo4j_user.txt infra/secrets/neo4j_password.txt infra/secrets/gemini_api_key.txt

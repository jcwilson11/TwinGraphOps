name: TwinGraphOps Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROD_AWS_SECRET_ID: ${{ vars.PROD_AWS_SECRET_ID }}
  PROD_EC2_INSTANCE_ID: ${{ vars.PROD_EC2_INSTANCE_ID }}
  API_ECR_REPOSITORY: ${{ vars.PROD_API_ECR_REPOSITORY || 'twingraphops-api' }}
  FRONTEND_ECR_REPOSITORY: ${{ vars.PROD_FRONTEND_ECR_REPOSITORY || 'twingraphops-frontend' }}
  ROLLBACK_METADATA_ASSET: production-release-metadata.json
  RELEASE_REF: ${{ github.ref_name }}
  DEPLOY_REPO_URL: https://github.com/${{ github.repository }}.git

concurrency:
  group: twingraphops-production-release
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.resolve_release_sha.outputs.release_sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Resolve release commit
        id: resolve_release_sha
        run: echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run API unit tests
        env:
          TWIN_ENV: ci
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt
          python -m unittest discover -s api/tests -v

      - name: Run rollback automation tests
        run: python -m unittest discover -s infra/tests -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --no-audit

      - name: Run frontend tests
        run: npm --prefix frontend test

      - name: Build frontend assets
        run: |
          npm --prefix frontend run build

  resolve-last-known-good-release:
    runs-on: ubuntu-latest
    outputs:
      has_rollback_candidate: ${{ steps.select.outputs.has_rollback_candidate }}
      rollback_release_tag: ${{ steps.select.outputs.rollback_release_tag }}
      rollback_release_sha: ${{ steps.metadata.outputs.release_sha }}
      rollback_api_image: ${{ steps.metadata.outputs.api_image }}
      rollback_frontend_image: ${{ steps.metadata.outputs.frontend_image }}
      rollback_deployed_at: ${{ steps.metadata.outputs.deployed_at }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Query prior GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=20" \
            -o /tmp/twingraphops-releases.json

      - name: Select previous known-good release metadata asset
        id: select
        run: |
          python infra/scripts/release_rollback.py select \
            --releases /tmp/twingraphops-releases.json \
            --current-tag "${RELEASE_REF}" \
            --asset-name "${ROLLBACK_METADATA_ASSET}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Download previous known-good rollback metadata
        if: steps.select.outputs.has_rollback_candidate == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.select.outputs.rollback_asset_url }}" \
            -o /tmp/rollback-metadata.json

      - name: Validate previous known-good rollback metadata
        if: steps.select.outputs.has_rollback_candidate == 'true'
        id: metadata
        run: |
          python infra/scripts/release_rollback.py validate \
            --input /tmp/rollback-metadata.json \
            --github-output "${GITHUB_OUTPUT}"

      - name: Record rollback candidate summary
        if: always()
        run: |
          if [[ "${{ steps.select.outputs.has_rollback_candidate }}" == "true" ]]; then
            {
              echo "## Rollback Candidate"
              echo ""
              echo "- Prior release: ${{ steps.select.outputs.rollback_release_tag }}"
              echo "- API image: ${{ steps.metadata.outputs.api_image }}"
              echo "- Frontend image: ${{ steps.metadata.outputs.frontend_image }}"
              echo "- Recorded at: ${{ steps.metadata.outputs.deployed_at }}"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            {
              echo "## Rollback Candidate"
              echo ""
              echo "No previous successful production release metadata is available."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

  resolve-release-images:
    needs: validate-release
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.resolve.outputs.api_image }}
      frontend_image: ${{ steps.resolve.outputs.frontend_image }}
      release_sha: ${{ needs.validate-release.outputs.release_sha }}

    steps:
      - name: Validate AWS release settings
        env:
          AWS_ROLE_ARN: ${{ vars.PROD_AWS_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$PROD_AWS_SECRET_ID"
          test -n "$PROD_EC2_INSTANCE_ID"
          test -n "$API_ECR_REPOSITORY"
          test -n "$FRONTEND_ECR_REPOSITORY"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve release image digests
        id: resolve
        env:
          RELEASE_SHA: ${{ needs.validate-release.outputs.release_sha }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_TAG="sha-${RELEASE_SHA}"

          resolve_digest() {
            local repository_name="$1"
            aws ecr describe-images \
              --repository-name "$repository_name" \
              --image-ids imageTag="$IMAGE_TAG" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true
          }

          API_DIGEST="$(resolve_digest "$API_ECR_REPOSITORY")"
          FRONTEND_DIGEST="$(resolve_digest "$FRONTEND_ECR_REPOSITORY")"

          if [[ -z "$API_DIGEST" || "$API_DIGEST" == "None" ]]; then
            echo "Release blocked: tag $RELEASE_REF points to commit $RELEASE_SHA, but no promotable API image exists for $IMAGE_TAG. Only previously validated CI artifacts may be released." >&2
            exit 1
          fi

          if [[ -z "$FRONTEND_DIGEST" || "$FRONTEND_DIGEST" == "None" ]]; then
            echo "Release blocked: tag $RELEASE_REF points to commit $RELEASE_SHA, but no promotable frontend image exists for $IMAGE_TAG. Only previously validated CI artifacts may be released." >&2
            exit 1
          fi

          echo "api_image=${ECR_REGISTRY}/${API_ECR_REPOSITORY}@${API_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${ECR_REGISTRY}/${FRONTEND_ECR_REPOSITORY}@${FRONTEND_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved release images for commit $RELEASE_SHA using tag $IMAGE_TAG."

      - name: Tag release aliases in ECR
        env:
          RELEASE_SHA: ${{ needs.validate-release.outputs.release_sha }}
        run: |
          IMAGE_TAG="sha-${RELEASE_SHA}"

          tag_existing_image() {
            local repository_name="$1"
            local source_tag="$2"
            local target_tag="$3"
            local image_manifest=""
            local source_digest=""
            local target_digest=""

            image_manifest="$(aws ecr batch-get-image \
              --repository-name "$repository_name" \
              --image-ids imageTag="$source_tag" \
              --query 'images[0].imageManifest' \
              --output text)"

            source_digest="$(aws ecr describe-images \
              --repository-name "$repository_name" \
              --image-ids imageTag="$source_tag" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"

            if [[ -z "$image_manifest" || "$image_manifest" == "None" ]]; then
              echo "Unable to resolve manifest for $repository_name:$source_tag" >&2
              exit 1
            fi

            if [[ -z "$source_digest" || "$source_digest" == "None" ]]; then
              echo "Unable to resolve digest for $repository_name:$source_tag" >&2
              exit 1
            fi

            target_digest="$(aws ecr describe-images \
              --repository-name "$repository_name" \
              --image-ids imageTag="$target_tag" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true)"

            if [[ "$target_digest" == "$source_digest" ]]; then
              echo "ECR tag $repository_name:$target_tag already points to $source_digest; leaving it in place."
              return
            fi

            if [[ -n "$target_digest" && "$target_digest" != "None" && "$target_tag" == "$RELEASE_REF" ]]; then
              echo "Release tag $repository_name:$target_tag already points to $target_digest, expected $source_digest." >&2
              exit 1
            fi

            aws ecr put-image \
              --repository-name "$repository_name" \
              --image-tag "$target_tag" \
              --image-manifest "$image_manifest" >/dev/null
          }

          tag_existing_image "$API_ECR_REPOSITORY" "$IMAGE_TAG" "$RELEASE_REF"
          tag_existing_image "$FRONTEND_ECR_REPOSITORY" "$IMAGE_TAG" "$RELEASE_REF"
          tag_existing_image "$API_ECR_REPOSITORY" "$IMAGE_TAG" "latest"
          tag_existing_image "$FRONTEND_ECR_REPOSITORY" "$IMAGE_TAG" "latest"

  deploy-production:
    needs: resolve-release-images
    runs-on: ubuntu-latest
    environment: production
    outputs:
      rollback_required: ${{ steps.deploy_status.outputs.rollback_required }}

    steps:
      - name: Validate AWS deployment settings
        env:
          AWS_ROLE_ARN: ${{ vars.PROD_AWS_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$PROD_AWS_SECRET_ID"
          test -n "$PROD_EC2_INSTANCE_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deployment command over AWS Systems Manager
        id: ssm
        continue-on-error: true
        env:
          API_IMAGE: ${{ needs.resolve-release-images.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.resolve-release-images.outputs.frontend_image }}
          RELEASE_SHA: ${{ needs.resolve-release-images.outputs.release_sha }}
        run: |
          cat > /tmp/twingraphops-deploy.sh <<EOF
          sudo bash -lc '
          set -euo pipefail
          APP_DIR=/opt/twingraphops/app

          echo "Starting production deploy for tag ${RELEASE_REF} using digest-pinned images."

          if [ ! -d "\$APP_DIR/.git" ]; then
            git clone "${DEPLOY_REPO_URL}" "\$APP_DIR"
          fi

          cd "\$APP_DIR"
          git fetch origin --tags
          git checkout --detach "${RELEASE_SHA}"

          AWS_REGION="${AWS_REGION}" \
          AWS_SECRETS_MANAGER_SECRET_ID="${PROD_AWS_SECRET_ID}" \
          API_IMAGE="${API_IMAGE}" \
          FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
          PUBLIC_API_BASE_URL="http://api:8000" \
          TWIN_ENV="production" \
          COMPOSE_PROJECT_NAME="twingraphops" \
          bash ./infra/scripts/deploy-ec2-compose.sh
          '
          EOF

          python - <<'PY'
          import json
          from pathlib import Path

          command_text = Path("/tmp/twingraphops-deploy.sh").read_text()
          Path("/tmp/ssm-commands.json").write_text(json.dumps({"commands": [command_text]}), encoding="utf-8")
          PY

          COMMAND_ID="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$PROD_EC2_INSTANCE_ID" \
            --comment "Deploy TwinGraphOps ${RELEASE_REF}" \
            --parameters file:///tmp/ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$PROD_EC2_INSTANCE_ID"

      - name: Capture deployment status
        if: always()
        id: deploy_status
        run: |
          if [[ "${{ steps.ssm.outcome }}" == "failure" ]]; then
            echo "rollback_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "rollback_required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show deployment logs
        if: always() && steps.ssm.outputs.command_id != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$PROD_EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json

      - name: Fail deployment job if rollout did not succeed
        if: steps.ssm.outcome != 'success'
        run: |
          echo "Production deployment failed for ${RELEASE_REF}."
          exit 1

  rollback-production:
    if: always() && needs.deploy-production.result == 'failure' && needs.deploy-production.outputs.rollback_required == 'true'
    needs: [deploy-production, resolve-last-known-good-release]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Require a previous known-good release
        run: |
          if [[ "${{ needs.resolve-last-known-good-release.outputs.has_rollback_candidate }}" != "true" ]]; then
            echo "Rollback failed: no previous successful production release metadata is available." >&2
            exit 1
          fi

      - name: Validate AWS rollback settings
        env:
          AWS_ROLE_ARN: ${{ vars.PROD_AWS_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$PROD_AWS_SECRET_ID"
          test -n "$PROD_EC2_INSTANCE_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send rollback command over AWS Systems Manager
        id: rollback_ssm
        env:
          API_IMAGE: ${{ needs.resolve-last-known-good-release.outputs.rollback_api_image }}
          FRONTEND_IMAGE: ${{ needs.resolve-last-known-good-release.outputs.rollback_frontend_image }}
          RELEASE_SHA: ${{ needs.resolve-last-known-good-release.outputs.rollback_release_sha }}
          ROLLBACK_RELEASE_TAG: ${{ needs.resolve-last-known-good-release.outputs.rollback_release_tag }}
        run: |
          cat > /tmp/twingraphops-rollback.sh <<EOF
          sudo bash -lc '
          set -euo pipefail
          APP_DIR=/opt/twingraphops/app

          echo "Starting automatic rollback to ${ROLLBACK_RELEASE_TAG} after failed deploy of ${RELEASE_REF}."

          if [ ! -d "\$APP_DIR/.git" ]; then
            git clone "${DEPLOY_REPO_URL}" "\$APP_DIR"
          fi

          cd "\$APP_DIR"
          git fetch origin --tags
          git checkout --detach "${RELEASE_SHA}"

          AWS_REGION="${AWS_REGION}" \
          AWS_SECRETS_MANAGER_SECRET_ID="${PROD_AWS_SECRET_ID}" \
          API_IMAGE="${API_IMAGE}" \
          FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
          PUBLIC_API_BASE_URL="http://api:8000" \
          TWIN_ENV="production" \
          COMPOSE_PROJECT_NAME="twingraphops" \
          bash ./infra/scripts/deploy-ec2-compose.sh
          '
          EOF

          python - <<'PY'
          import json
          from pathlib import Path

          command_text = Path("/tmp/twingraphops-rollback.sh").read_text()
          Path("/tmp/ssm-rollback-commands.json").write_text(json.dumps({"commands": [command_text]}), encoding="utf-8")
          PY

          COMMAND_ID="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$PROD_EC2_INSTANCE_ID" \
            --comment "Rollback TwinGraphOps ${RELEASE_REF} to ${ROLLBACK_RELEASE_TAG}" \
            --parameters file:///tmp/ssm-rollback-commands.json \
            --query 'Command.CommandId' \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$PROD_EC2_INSTANCE_ID"

      - name: Show rollback logs
        if: always() && steps.rollback_ssm.outputs.command_id != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.rollback_ssm.outputs.command_id }}" \
            --instance-id "$PROD_EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json

      - name: Record rollback summary
        if: always()
        run: |
          {
            echo "## Rollback Result"
            echo ""
            echo "- Failed release: ${RELEASE_REF}"
            echo "- Rolled back to: ${{ needs.resolve-last-known-good-release.outputs.rollback_release_tag }}"
            echo "- API image: ${{ needs.resolve-last-known-good-release.outputs.rollback_api_image }}"
            echo "- Frontend image: ${{ needs.resolve-last-known-good-release.outputs.rollback_frontend_image }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-github-release:
    needs: [deploy-production, resolve-release-images]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Write rollback metadata asset
        run: |
          python infra/scripts/release_rollback.py write \
            --release-tag "${RELEASE_REF}" \
            --release-sha "${{ needs.resolve-release-images.outputs.release_sha }}" \
            --api-image "${{ needs.resolve-release-images.outputs.api_image }}" \
            --frontend-image "${{ needs.resolve-release-images.outputs.frontend_image }}" \
            --output production-release-metadata.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          name: TwinGraphOps ${{ env.RELEASE_REF }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            infra/aws/ec2-compose-stack.yml
            production-release-metadata.json

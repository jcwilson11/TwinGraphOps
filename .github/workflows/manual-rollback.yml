name: TwinGraphOps Manual Rollback

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Previously successful production release tag to redeploy (for example v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROD_AWS_SECRET_ID: ${{ vars.PROD_AWS_SECRET_ID }}
  PROD_EC2_INSTANCE_ID: ${{ vars.PROD_EC2_INSTANCE_ID }}
  ROLLBACK_METADATA_ASSET: production-release-metadata.json
  RELEASE_REF: ${{ inputs.release_tag }}
  DEPLOY_REPO_URL: https://github.com/${{ github.repository }}.git

concurrency:
  group: twingraphops-production-manual-rollback
  cancel-in-progress: false

jobs:
  validate-rollback-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run rollback automation tests
        run: python -m unittest discover -s infra/tests -v

  resolve-rollback-release:
    needs: validate-rollback-request
    runs-on: ubuntu-latest
    outputs:
      rollback_release_tag: ${{ steps.metadata.outputs.release_tag }}
      rollback_release_sha: ${{ steps.metadata.outputs.release_sha }}
      rollback_api_image: ${{ steps.metadata.outputs.api_image }}
      rollback_frontend_image: ${{ steps.metadata.outputs.frontend_image }}
      rollback_deployed_at: ${{ steps.metadata.outputs.deployed_at }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Query GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=50" \
            -o /tmp/twingraphops-releases.json

      - name: Resolve requested rollback release asset
        id: resolve_asset
        run: |
          python infra/scripts/release_rollback.py select-tag \
            --releases /tmp/twingraphops-releases.json \
            --release-tag "${RELEASE_REF}" \
            --asset-name "${ROLLBACK_METADATA_ASSET}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Download rollback metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.resolve_asset.outputs.rollback_asset_url }}" \
            -o /tmp/manual-rollback-metadata.json

      - name: Validate rollback metadata
        id: metadata
        run: |
          python infra/scripts/release_rollback.py validate \
            --input /tmp/manual-rollback-metadata.json \
            --github-output "${GITHUB_OUTPUT}"

      - name: Record rollback plan summary
        run: |
          {
            echo "## Manual Rollback Plan"
            echo ""
            echo "- Requested release tag: ${{ steps.metadata.outputs.release_tag }}"
            echo "- Recorded deployment timestamp: ${{ steps.metadata.outputs.deployed_at }}"
            echo "- API image: ${{ steps.metadata.outputs.api_image }}"
            echo "- Frontend image: ${{ steps.metadata.outputs.frontend_image }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  rollback-production:
    needs: resolve-rollback-release
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate AWS rollback settings
        env:
          AWS_ROLE_ARN: ${{ vars.PROD_AWS_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$PROD_AWS_SECRET_ID"
          test -n "$PROD_EC2_INSTANCE_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send manual rollback command over AWS Systems Manager
        id: rollback_ssm
        env:
          API_IMAGE: ${{ needs.resolve-rollback-release.outputs.rollback_api_image }}
          FRONTEND_IMAGE: ${{ needs.resolve-rollback-release.outputs.rollback_frontend_image }}
          RELEASE_SHA: ${{ needs.resolve-rollback-release.outputs.rollback_release_sha }}
          REQUESTED_RELEASE_TAG: ${{ needs.resolve-rollback-release.outputs.rollback_release_tag }}
        run: |
          cat > /tmp/twingraphops-manual-rollback.sh <<EOF
          sudo bash -lc '
          set -euo pipefail
          APP_DIR=/opt/twingraphops/app

          echo "Starting manual rollback to ${REQUESTED_RELEASE_TAG} using stored production digest refs."

          if [ ! -d "\$APP_DIR/.git" ]; then
            git clone "${DEPLOY_REPO_URL}" "\$APP_DIR"
          fi

          cd "\$APP_DIR"
          git fetch origin --tags
          git checkout --detach "${RELEASE_SHA}"

          AWS_REGION="${AWS_REGION}" \
          AWS_SECRETS_MANAGER_SECRET_ID="${PROD_AWS_SECRET_ID}" \
          API_IMAGE="${API_IMAGE}" \
          FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
          PUBLIC_API_BASE_URL="http://api:8000" \
          TWIN_ENV="production" \
          COMPOSE_PROJECT_NAME="twingraphops" \
          bash ./infra/scripts/deploy-ec2-compose.sh
          '
          EOF

          python - <<'PY'
          import json
          from pathlib import Path

          command_text = Path("/tmp/twingraphops-manual-rollback.sh").read_text()
          Path("/tmp/ssm-manual-rollback-commands.json").write_text(json.dumps({"commands": [command_text]}), encoding="utf-8")
          PY

          COMMAND_ID="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$PROD_EC2_INSTANCE_ID" \
            --comment "Manual rollback TwinGraphOps to ${REQUESTED_RELEASE_TAG}" \
            --parameters file:///tmp/ssm-manual-rollback-commands.json \
            --query 'Command.CommandId' \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$PROD_EC2_INSTANCE_ID"

      - name: Show manual rollback logs
        if: always() && steps.rollback_ssm.outputs.command_id != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.rollback_ssm.outputs.command_id }}" \
            --instance-id "$PROD_EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json

      - name: Record manual rollback summary
        if: always()
        run: |
          {
            echo "## Manual Rollback Result"
            echo ""
            echo "- Rolled back to: ${{ needs.resolve-rollback-release.outputs.rollback_release_tag }}"
            echo "- Recorded deployment timestamp: ${{ needs.resolve-rollback-release.outputs.rollback_deployed_at }}"
            echo "- API image: ${{ needs.resolve-rollback-release.outputs.rollback_api_image }}"
            echo "- Frontend image: ${{ needs.resolve-rollback-release.outputs.rollback_frontend_image }}"
          } >> "${GITHUB_STEP_SUMMARY}"

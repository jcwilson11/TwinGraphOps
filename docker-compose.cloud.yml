services:
  neo4j:
    image: neo4j:5
    container_name: twin_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      TWIN_ENV: ${TWIN_ENV:-cloud}
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/7687'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    image: ${API_IMAGE:-twin_api:latest}
    container_name: twin_api
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      GEMINI_MAX_CHARS: ${GEMINI_MAX_CHARS:-2400}
      GEMINI_CHUNK_OVERLAP: ${GEMINI_CHUNK_OVERLAP:-200}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-2}
      GEMINI_RETRY_BACKOFF_SECONDS: ${GEMINI_RETRY_BACKOFF_SECONDS:-1.0}
      ARTIFACTS_DIR: /app/runtime/artifacts
      TWIN_ENV: ${TWIN_ENV:-cloud}
      TWIN_RELEASE_SHA: ${TWIN_RELEASE_SHA:-unknown}
      TWIN_API_IMAGE: ${API_IMAGE:-twin_api:latest}
      TWIN_FRONTEND_IMAGE: ${FRONTEND_IMAGE:-twin_frontend:latest}
    expose:
      - "8000"
    volumes:
      - api_artifacts:/app/runtime/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    image: ${FRONTEND_IMAGE:-twin_frontend:latest}
    container_name: twin_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://api:8000}
      TWIN_ENV: ${TWIN_ENV:-cloud}
      TWIN_RELEASE_SHA: ${TWIN_RELEASE_SHA:-unknown}
    expose:
      - "3000"
    command: node server.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: twin_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.4
    container_name: twin_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: twin_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
      - grafana

volumes:
  neo4j_data:
  neo4j_logs:
  api_artifacts:
  prometheus_data:
  grafana_data:

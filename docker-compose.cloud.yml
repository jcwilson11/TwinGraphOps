services:
  neo4j:
    image: neo4j:5
    container_name: twin_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      TWIN_ENV: ${TWIN_ENV:-cloud}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/7687'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: ./api
    image: twin_api:latest
    container_name: twin_api
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      GEMINI_MAX_CHARS: ${GEMINI_MAX_CHARS:-3000}
      GEMINI_CHUNK_OVERLAP: ${GEMINI_CHUNK_OVERLAP:-400}
      ARTIFACTS_DIR: /app/runtime/artifacts
      TWIN_ENV: ${TWIN_ENV:-cloud}
    volumes:
      - api_artifacts:/app/runtime/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build: ./frontend
    image: twin_frontend:latest
    container_name: twin_frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      TWIN_ENV: ${TWIN_ENV:-cloud}
    command: node server.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: twin_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  neo4j_data:
  neo4j_logs:
  api_artifacts: